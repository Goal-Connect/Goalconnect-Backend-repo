  /messages:
    post:
      tags: [Messages]
      summary: Send a direct message (HTTP fallback)
      description: |
        Sends a direct message between users via HTTP.

        **Conversation rules:**
        - Only a **scout** can start a new conversation, and only with a **player**
        - Once a conversation exists, both parties can send messages freely
        - You cannot message yourself

        > **Prefer Socket.IO** for real-time delivery (`message:send` event).
        > This HTTP endpoint is a fallback and does not support `sharedVideo`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
            example:
              receiverId: 680df8bf8f0e823a9ca20e99
              content: Hi Abebe, I'd love to discuss a scouting opportunity!
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: Message sent successfully }
                  data:
                    $ref: "#/components/schemas/Message"
        "400":
          description: Validation error or self-message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                success: false
                message: You cannot send a message to yourself
        "403":
          description: Scout-only conversation start rule violated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                success: false
                message: Only scouts can start a new conversation with players
        "404":
          description: Receiver user not found

  /messages/{userId}:
    get:
      tags: [Messages]
      summary: Get full conversation history with a user
      description: |
        Returns all messages exchanged between the authenticated user and `userId`,
        sorted oldest-first (chronological order).

        > **Prefer Socket.IO** `conversation:history` event for real-time apps.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            $ref: "#/components/schemas/ObjectId"
          description: The `User._id` of the other participant in the conversation
          example: 680df8bf8f0e823a9ca20e99
      responses:
        "200":
          description: Conversation messages (oldest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  count: { type: integer, example: 12 }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
        "400":
          description: Invalid userId format
        "401":
          description: Unauthorized

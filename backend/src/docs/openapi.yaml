  /videos/{id}/like:
    post:
      tags: [Videos]
      summary: Toggle like on a video
      description: |
        If the current user **has not** liked the video, adds a like.
        If they **have** liked it, removes the like (toggle).
        Requires any authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/ObjectId"
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message:
                    type: string
                    example: Video liked
                    enum: [Video liked, Video unliked]
                  data:
                    type: object
                    properties:
                      likes:
                        type: array
                        items:
                          $ref: "#/components/schemas/ObjectId"
                        description: Updated array of User IDs who liked the video
                      likesCount:
                        type: integer
                        example: 14
        "401":
          description: Unauthorized
        "404":
          description: Video not found

  /videos/{id}/comments:
    get:
      tags: [Videos]
      summary: Get top-level comments for a video (with nested replies)
      description: |
        Returns all **top-level** comments (where `parentComment` is null).
        Each comment includes its `replies` array populated with reply objects.
        Results are sorted newest-first.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/ObjectId"
          description: Video ID
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  count: { type: integer, example: 3 }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
    post:
      tags: [Videos]
      summary: Add a comment or reply to a video
      description: |
        Posts a new comment on the video.

        To post a **reply**, include `parentComment` with the `_id` of the comment being replied to.
        The reply is automatically added to the parent's `replies` array.

        Any authenticated user can comment.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/ObjectId"
          description: Video ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentRequest"
            examples:
              topLevel:
                summary: Top-level comment
                value:
                  text: Incredible technique, great future ahead!
              reply:
                summary: Reply to an existing comment
                value:
                  text: Totally agree!
                  parentComment: 680df8bf8f0e823a9ca20e99
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/Comment"
        "400":
          description: Empty comment text or parent not found
        "401":
          description: Unauthorized
        "404":
          description: Video not found

  /videos/{id}/comments/{commentId}:
    delete:
      tags: [Videos]
      summary: Delete a comment
      description: |
        Only the **comment author** or an **admin** can delete a comment.
        Note: Deleting a parent comment does **not** cascade-delete its replies automatically.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/ObjectId"
          description: Video ID
        - in: path
          name: commentId
          required: true

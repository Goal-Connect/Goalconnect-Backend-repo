  /videos/feed:
    get:
      tags: [Videos]
      summary: Smart discovery feed (role-filtered)
      description: |
        Returns a paginated list of `FeedItem` objects.
        Visibility rules by role:
        - **Admin** — all analyzed or uploaded videos
        - **Academy** — all public player videos + their own uploaded videos
        - **Scout / Player / Guest** — public videos that are linked to a player

        Pass the JWT in the `Authorization` header to get role-based filtering.
        Omit it to receive only public, player-linked videos.
      security: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
          description: Items per page
      responses:
        "200":
          description: Feed items list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 10
                  total:
                    type: integer
                    example: 47
                  page:
                    type: integer
                    example: 1
                  pages:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedItem"

  /videos:
    get:
      tags: [Videos]
      summary: List public analyzed videos
      description: |
        Returns only videos where `privacy: public` AND `processingStatus: analyzed`.
        Use `/videos/feed` for a broader result set that includes uploaded-but-not-yet-analyzed videos.
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, default: 20 }
        - in: query
          name: videoType
          schema: { type: string, enum: [highlight, drill, match] }
          description: Filter by video type
        - in: query
          name: playerId
          schema:
            $ref: "#/components/schemas/ObjectId"
          description: Filter to a specific player's videos
      responses:
        "200":
          description: Video list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  count: { type: integer }
                  total: { type: integer }
                  page: { type: integer }
                  pages: { type: integer }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Video"
    post:
      tags: [Videos]
      summary: Upload a video (academy or player)
      description: |
        Uploads a video file to **Cloudinary** and creates a `Video` document.

        **Content-Type must be `multipart/form-data`.**

        After upload the video is in `processingStatus: uploaded`.
        A future CV pipeline will update it to `analyzed`.

        **Who can upload:**
        - **Academy** — can upload for any player in their roster (pass `playerId`), or as a generic academy video (omit `playerId`)
        - **Player** — always uploads to their own profile; `playerId` is ignored

        **Requires:** `approved` account status.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadVideoRequest"
      responses:
        "201":
          description: Video uploaded and queued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message:
                    type: string
                    example: Video uploaded successfully. It will be processed for analysis.
                  data:
                    $ref: "#/components/schemas/Video"
        "400":
          description: Validation failed or no file attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                noFile:
                  summary: No video file in request
                  value:
                    success: false
                    message: Video file is required
                validationFail:
                  summary: Missing required field
                  value:
                    success: false
                    message: Validation failed
                    errors:
                      - type: field
                        msg: Video type is required
                        path: videoType
                        location: body
        "401":
          description: Missing or invalid token
        "403":
          description: Account not approved or wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                success: false
                message: Your account is pending approval. Please wait for admin verification.

  /videos/{id}:
    get:
      tags: [Videos]
      summary: Get video by ID
      description: |
        Fetches a single video and increments the view counter.

        **Privacy rules:**
        - `public` — anyone can view
        - `scout_only` — requires authenticated scout or admin
        - `private` — requires the owning academy or admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/ObjectId"
          description: Video document ID
      responses:
        "200":
          description: Video details (view count incremented)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/Video"
        "403":
          description: Video is private or scout-only and caller lacks permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                privateVideo:
                  value: { success: false, message: This video is private }
                scoutOnly:
                  value: { success: false, message: This video is only available to scouts }
        "404":
          description: Video not found
    put:
      tags: [Videos]
      summary: Update video metadata
      description: |
        Updates `title`, `description`, `privacy`, or `drillType`.
        Cannot change `videoUrl` or `videoType` after upload.

        **Who can update:**
        - The **uploader** (whoever called POST /videos)
        - An **academy** user if the video belongs to one of their players
        - Any **admin**
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/ObjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVideoRequest"
            example:
              title: Updated — Abebe Sprint Drill
              privacy: public
      responses:
        "200":
          description: Video updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: Video updated successfully }
                  data:
                    $ref: "#/components/schemas/Video"
        "403":
          description: Not the owner or authorized role
        "404":
          description: Video not found
    delete:
      tags: [Videos]
      summary: Delete video (owner only)
      description: |
        Deletes the video from the database **and** removes the file from Cloudinary.
        Also deletes any associated `DrillAnalysis` document.

        **Who can delete:**
        - The **uploader**
        - An **academy** user if the video belongs to one of their players
        - Any **admin**
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/ObjectId"
      responses:
        "200":
          description: Video deleted from DB and Cloudinary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: Video deleted successfully }
        "403":
          description: Not the owner or authorized role
        "404":
          description: Video not found

  /videos/{id}/analysis:
    get:

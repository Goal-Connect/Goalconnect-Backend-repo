openapi: 3.0.3
info:
  title: GoalConnect Backend API
  version: 1.0.0
  description: |
    ## GoalConnect REST API

    Digital Talent Scouting Platform for Ethiopian Football.

    ### Roles
    | Role    | Description |
    |---------|-------------|
    | admin   | Platform administrator |
    | academy | Football academy that manages players |
    | scout   | Talent scout who discovers players |
    | player  | Individual footballer |

    ### Authentication
    All protected routes require a **Bearer JWT** token in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```
    Tokens are obtained from `/auth/login` or `/auth/register`.

    ### Real-time Messaging (Socket.IO)
    Core messaging is handled via **Socket.IO** at `ws://localhost:5000`.
    Connect with JWT in the handshake:
    ```js
    const socket = io('http://localhost:5000', {
      auth: { token: '<jwt>' }
    });
    ```
    **Client → Server events:**
    - `message:send` — `{ toUserId, content, sharedVideo? }`
    - `conversation:history` — `{ withUserId, limit? }`
    - `message:edit` — `{ messageId, newContent }`
    - `message:delete` — `{ messageId }`

    **Server → Client events:**
    - `connection:success` — `{ userId, role }`
    - `message:received` — full message object
    - `message:edited` — updated message object
    - `message:deleted` — `{ _id }`

    > Only a **scout** can start a new conversation (first message).
    > After that, both parties can reply.
servers:
  - url: http://localhost:5000/api
    description: Local development server

tags:
  - name: Misc
  - name: Auth
  - name: Academies
  - name: Players
  - name: Scouts
  - name: Videos
  - name: Matches
  - name: Admin
  - name: Messages

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ObjectId:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: 680df8bf8f0e823a9ca20e99

    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: field
              msg:
                type: string
                example: Email is required
              path:
                type: string
                example: email
              location:
                type: string
                example: body

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful
        token:
          type: string
          description: JWT bearer token — include in Authorization header for all protected requests
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          type: object
          properties:
            id:
              $ref: "#/components/schemas/ObjectId"
            email:
              type: string
              format: email
              example: scout@example.com
            role:
              type: string
              enum: [admin, academy, scout, player]
              example: scout
            status:
              type: string
              enum: [pending, verified, approved, suspended, rejected]
              example: approved

    UserSummary:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ObjectId"
        email:
          type: string
          format: email
          example: academy@example.com
        role:
          type: string
          enum: [admin, academy, scout, player]
        status:
          type: string
          enum: [pending, verified, approved, suspended, rejected]
        emailVerified:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        text:
          type: string
          example: Great footwork!
          maxLength: 1000
        user:
          type: object
          properties:
            _id:
              $ref: "#/components/schemas/ObjectId"
            fullName:
              type: string
              example: John Scout
            profileImageUrl:
              type: string
              example: https://res.cloudinary.com/...
            role:
              type: string
              enum: [admin, academy, scout, player]
        video:
          $ref: "#/components/schemas/ObjectId"
        likes:
          type: array
          items:
            $ref: "#/components/schemas/ObjectId"
          description: Array of User IDs who liked this comment
        parentComment:
          allOf:
            - $ref: "#/components/schemas/ObjectId"
          nullable: true
          description: ID of parent comment if this is a reply, null for top-level
        replies:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
          description: Nested reply comments
        createdAt:
          type: string
          format: date-time

    FeedItem:
      type: object
      description: A single item in the video discovery feed
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        video:
          type: object
          properties:
            _id:
              $ref: "#/components/schemas/ObjectId"
            title:
              type: string
              example: Amazing dribbling skills
            description:
              type: string
            privacy:
              type: string
              enum: [public, scout_only, private]
            uploadedBy:
              $ref: "#/components/schemas/ObjectId"
            videoUrl:
              type: string
              example: https://res.cloudinary.com/dwzxqbwv1/video/upload/v1/goalconnect_videos/abc123.mp4
            thumbnailUrl:
              type: string
            views:
              type: integer
              example: 142
            likes:
              type: array
              items:
                $ref: "#/components/schemas/ObjectId"
            processingStatus:
              type: string
              enum: [uploaded, processing, analyzed, failed]
            duration:
              type: integer
              description: Duration in seconds
        player:
          type: object
          description: Player the video belongs to (null for academy-generic videos)
          nullable: true
          properties:
            _id:
              $ref: "#/components/schemas/ObjectId"
            fullName:
              type: string
              example: Abebe Girma
            position:
              type: string
              example: Winger
            dateOfBirth:
              type: string
              format: date-time
            profileImageUrl:
              type: string
            academy:
              type: object
              properties:
                _id:
                  $ref: "#/components/schemas/ObjectId"
                name:
                  type: string
                  example: Addis FC Academy
                region:
                  type: string
                  example: Addis Ababa
        academy:
          type: object
          nullable: true
          description: Academy extracted from player.academy
          properties:
            _id:
              $ref: "#/components/schemas/ObjectId"
            name:
              type: string
            region:
              type: string
        isSaved:
          type: boolean
          example: false
          description: Whether the current user has saved this player (always false for now)

    Academy:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        user:
          $ref: "#/components/schemas/ObjectId"
        name:
          type: string
        region:
          type: string
        woreda:
          type: string
        address:
          type: string
        ownerName:
          type: string
        contactPhone:
          type: string
        description:
          type: string
        logoUrl:
          type: string
        licenseDocumentUrl:
          type: string
        registrationStatus:
          type: string
          enum: [awaiting_approval, approved, rejected, suspended]

    Player:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        academy:
          oneOf:
            - $ref: "#/components/schemas/ObjectId"
            - type: object
              additionalProperties: true
        user:
          $ref: "#/components/schemas/ObjectId"
        fullName:
          type: string
        dateOfBirth:
          type: string
          format: date-time
        position:
          type: string
          enum: [goalkeeper, defender, midfielder, forward]
        strongFoot:
          type: string
          enum: [left, right, both]
        height:
          type: integer
        weight:
          type: integer
        jerseyNumber:
          type: integer
        profileImageUrl:
          type: string
        bio:
          type: string
        status:
          type: string
          enum: [active, inactive, archived]

    Video:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        player:
          oneOf:
            - $ref: "#/components/schemas/ObjectId"
            - type: object
              additionalProperties: true
        match:
          $ref: "#/components/schemas/ObjectId"
        uploadedBy:
          $ref: "#/components/schemas/ObjectId"
        title:
          type: string
        description:
          type: string
        videoUrl:
          type: string
        thumbnailUrl:
          type: string
        videoType:
          type: string
          enum: [highlight, drill, match]
        drillType:
          type: string
          enum: [dribbling, shooting, passing, speed, agility, other]
        privacy:
          type: string
          enum: [public, scout_only, private]
        processingStatus:
          type: string
          enum: [uploaded, processing, analyzed, failed]
        views:
          type: integer

    Match:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        academy:
          $ref: "#/components/schemas/ObjectId"
        opponent:
          type: string
        matchDate:
          type: string
          format: date-time
        location:
          type: string
        matchType:
          type: string
          enum: [friendly, league, tournament, training]
        homeScore:
          type: integer
        awayScore:
          type: integer
        isHome:
          type: boolean
        resultStatus:
          type: string
          enum: [pending, submitted, verified, disputed]
        notes:
          type: string

    MatchStats:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        match:
          $ref: "#/components/schemas/ObjectId"
        player:
          oneOf:
            - $ref: "#/components/schemas/ObjectId"
            - type: object
              additionalProperties: true
        goals:
          type: integer
        assists:
          type: integer
        minutesPlayed:
          type: integer
        yellowCards:
          type: integer
        redCard:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 10
        notes:
          type: string

    Message:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        senderId:
          $ref: "#/components/schemas/ObjectId"
        receiverId:
          $ref: "#/components/schemas/ObjectId"
        content:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    DrillAnalysis:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/ObjectId"
        video:
          $ref: "#/components/schemas/ObjectId"
        player:
          $ref: "#/components/schemas/ObjectId"
        metrics:
          type: object
          additionalProperties: true
        heatmapData:
          type: object
          additionalProperties: true
        trackingData:
          type: object
          additionalProperties: true
        confidence:
          type: number

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [academy, scout]
        name:
          type: string
        region:
          type: string
        woreda:
          type: string
        address:
          type: string
        ownerName:
          type: string
        contactPhone:
          type: string
        fullName:
          type: string
        organization:
          type: string
        country:
          type: string
        phone:
          type: string

    UpdatePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6

    CreatePlayerRequest:
      type: object
      required: [email, password, fullName, dateOfBirth, position]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        fullName:
          type: string
        dateOfBirth:
          type: string
          format: date
        position:
          type: string
          enum: [goalkeeper, defender, midfielder, forward]
        secondaryPosition:
          type: string
          enum: [goalkeeper, defender, midfielder, forward, ""]
        strongFoot:
          type: string
          enum: [left, right, both]
        height:
          type: integer
        weight:
          type: integer
        jerseyNumber:
          type: integer
        profileImageUrl:
          type: string
        bio:
          type: string

    UpdatePlayerRequest:
      type: object
      properties:
        fullName:
          type: string
        dateOfBirth:
          type: string
          format: date
        position:
          type: string
          enum: [goalkeeper, defender, midfielder, forward]
        secondaryPosition:
          type: string
          enum: [goalkeeper, defender, midfielder, forward, ""]
        strongFoot:
          type: string
          enum: [left, right, both]
        height:
          type: integer
        weight:
          type: integer
        jerseyNumber:
          type: integer
        profileImageUrl:
          type: string
        bio:
          type: string
        status:
          type: string
          enum: [active, inactive, archived]

    UploadVideoRequest:
      type: object
      description: |
        **Multipart form-data** request — use `Content-Type: multipart/form-data`.
        The actual video file is sent in the `video` field.
        `playerId` is optional for academies (creates a generic academy video).
        Players uploading always default to their own profile.
      required: [title, videoType, video]
      properties:
        video:
          type: string
          format: binary
          description: The video file to upload. Accepted formats — mp4, mkv, mov, avi. Max 100 MB.
        title:
          type: string
          minLength: 2
          maxLength: 100
          example: Abebe – Dribbling Highlights vs Dire Dawa FC
        description:
          type: string
          maxLength: 500
          example: Full dribbling drill session recorded at training on 2025-03-15
        videoType:
          type: string
          enum: [highlight, drill, match]
          example: drill
          description: |
            - `highlight` — Short best-of clip
            - `drill` — Training drill (enables CV analysis)
            - `match` — Full or partial match footage
        drillType:
          type: string
          enum: [dribbling, shooting, passing, speed, agility, other]
          example: dribbling
          description: Required when videoType is `drill`
        privacy:
          type: string
          enum: [public, scout_only, private]
          default: public
          example: scout_only
          description: |
            - `public` — Visible to everyone
            - `scout_only` — Visible only to approved scouts and admins
            - `private` — Visible only to the owning academy
        playerId:
          allOf:
            - $ref: "#/components/schemas/ObjectId"
          description: |
            (Academy only) ID of the player this video belongs to.
            Must be a player in the academy's roster.
            Omit to upload as a generic academy video.

    UpdateVideoRequest:
      type: object
      description: All fields are optional — send only what you want to change.
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 100
          example: Updated title — Abebe Sprint Drill
        description:
          type: string
          maxLength: 500
          example: Updated description with more context
        drillType:
          type: string
          enum: [dribbling, shooting, passing, speed, agility, other]
          example: speed
        privacy:
          type: string
          enum: [public, scout_only, private]
          example: public

    AddCommentRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 1000
          example: Incredible technique, great future ahead!
        parentComment:
          allOf:
            - $ref: "#/components/schemas/ObjectId"
          nullable: true
          description: |
            Set to the `_id` of an existing comment to post a **reply**.
            Omit (or set to null) for a **top-level** comment.
          example: 680df8bf8f0e823a9ca20e99

    SendMessageRequest:
      type: object
      required: [receiverId]
      description: |
        Send a direct message to another user.
        **Rule:** Only a scout can start a new conversation, and only with a player.
        After the first message is sent, both parties can reply freely.
      properties:
        receiverId:
          allOf:
            - $ref: "#/components/schemas/ObjectId"
          description: The User `_id` of the recipient (not the Player or Scout profile ID)
          example: 680df8bf8f0e823a9ca20e99
        content:
          type: string
          maxLength: 2000
          example: Hello Abebe, I would love to discuss a scouting opportunity with you.
        sharedVideo:
          allOf:
            - $ref: "#/components/schemas/ObjectId"
          description: Optional — share a video in the message. ID of the Video document.
          example: 681abc123def456789012345

    CreateMatchRequest:
      type: object
      required: [opponent, matchDate]
      properties:
        opponent:
          type: string
        matchDate:
          type: string
          format: date-time
        location:
          type: string
        matchType:
          type: string
          enum: [friendly, league, tournament, training]
        isHome:
          type: boolean
        notes:
          type: string

    UpdateMatchRequest:
      type: object
      properties:
        opponent:
          type: string
        matchDate:
          type: string
          format: date-time
        location:
          type: string
        matchType:
          type: string
          enum: [friendly, league, tournament, training]
        homeScore:
          type: integer
        awayScore:
          type: integer
        isHome:
          type: boolean
        notes:
          type: string
        resultStatus:
          type: string
          enum: [pending, submitted, verified, disputed]

    MatchStatsRequest:
      type: object
      required: [playerId]
      properties:
        playerId:
          $ref: "#/components/schemas/ObjectId"
        goals:
          type: integer
        assists:
          type: integer
        minutesPlayed:
          type: integer
        yellowCards:
          type: integer
        redCard:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 10
        notes:
          type: string

    UpdateAcademyRequest:
      type: object
      properties:
        name:
          type: string
        region:
          type: string
        woreda:
          type: string
        address:
          type: string
        ownerName:
          type: string
        foundingDate:
          type: string
          format: date
        contactPhone:
          type: string
        description:
          type: string
        logoUrl:
          type: string

    UpdateScoutProfileRequest:
      type: object
      properties:
        fullName:
          type: string
        organization:
          type: string
        country:
          type: string
        phone:
          type: string
        profileImageUrl:
          type: string
        bio:
          type: string
        interestedPositions:
          type: array
          items:
            type: string
            enum: [goalkeeper, defender, midfielder, forward]
        preferredAgeRange:
          type: object
          properties:
            min:
              type: integer
            max:
              type: integer
        preferredRegions:
          type: array
          items:
            type: string


paths:
  /health:
    get:
      tags: [Misc]
      summary: Health check
      responses:
        "200":
          description: API is running

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new academy or scout
      description: |
        Creates a new user account and a role-specific profile.
        - For **academy** role: also creates an `Academy` profile (`registrationStatus: awaiting_approval`)
        - For **scout** role: also creates a `Scout` profile

        A **verification email** and **welcome email** are sent automatically.
        The returned JWT is valid immediately — the user can make API calls before verifying their email,
        but certain protected resources may require `emailVerified: true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              academy:
                summary: Register an academy
                value:
                  email: addisfc@example.com
                  password: secret123
                  role: academy
                  name: Addis FC Academy
                  region: Addis Ababa
                  woreda: Bole
                  ownerName: Tesfaye Alemu
                  contactPhone: "+251911234567"
              scout:
                summary: Register a scout
                value:
                  email: scout@example.com
                  password: secret123
                  role: scout
                  fullName: John Mwangi
                  organization: AFC Talent Agency
                  country: Kenya
                  phone: "+254712345678"
      responses:
        "201":
          description: Registration successful — returns JWT and user summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emailTaken:
                  summary: Email already registered
                  value:
                    success: false
                    message: An account with this email already exists.
                validationFail:
                  summary: Missing required fields
                  value:
                    success: false
                    message: Validation failed
                    errors:
                      - type: field
                        msg: Please provide a valid email
                        path: email
                        location: body

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive a JWT token
      description: |
        Authenticates the user and returns a signed JWT.
        A **login security alert email** is sent to the user (non-blocking).

        **Suspended** and **rejected** accounts are blocked from logging in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: scout@example.com
              password: secret123
      responses:
        "200":
          description: Login successful — returns JWT and user summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                success: false
                message: Invalid email or password
        "403":
          description: Account suspended or rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                success: false
                message: Your account has been suspended. Please contact support.

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user + role profile
      description: |
        Returns the authenticated user and their role-specific profile:
        - **academy** → includes `Academy` document
        - **scout** → includes `Scout` document
        - **player** → includes `Player` document
        - **admin** → profile is null
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user and profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/UserSummary"
                      profile:
                        description: The Academy, Scout, or Player document for this user
                        nullable: true
                        type: object
                        additionalProperties: true
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/updatepassword:
    put:
      tags: [Auth]
      summary: Change password (while logged in)
      description: The current password is verified before setting the new one. Returns a fresh JWT.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePasswordRequest"
            example:
              currentPassword: oldSecret123
              newPassword: newSecret456
      responses:
        "200":
          description: Password updated — returns new JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Current password is incorrect or token invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                success: false
                message: Current password is incorrect

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (client-side token removal)
      description: |
        JWTs are stateless — this endpoint simply returns a success response.
        The client must delete the token from `localStorage` / cookies.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logged out successfully. Please remove the token from client storage.

  /auth/verify-email/{token}:
    get:
      tags: [Auth]
      summary: Verify email address using token from email link
      description: |
        The frontend receives the raw token via the `?verify_token=` query param and calls this endpoint.
        On success `emailVerified` is set to `true` on the user document.
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: Raw (unhashed) verification token extracted from the email link URL
          example: a3f1c2d4e5b6789012345678abcdef1234567890abcdef1234567890abcdef12
      responses:
        "200":
          description: Email verified (or already verified)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Email verified successfully! You can now log in.
        "400":
          description: Token invalid or not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                success: false
                message: Invalid or expired verification link. Please request a new one.

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend email verification link
      description: |
        Re-generates the verification token and sends a new email.
        Always returns HTTP 200 to prevent user enumeration (even if email not found).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: scout@example.com
      responses:
        "200":
          description: Verification email sent (if account exists and is unverified)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: If an unverified account with that email exists, a verification link has been sent.

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: |
        Generates a secure reset token (expires in **10 minutes**) and emails a reset link.
        Always returns HTTP 200 to prevent user enumeration.

        The frontend reads `?reset_token=<token>` from the URL and passes it to `/auth/reset-password/:token`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: scout@example.com
      responses:
        "200":
          description: Reset email sent (if account exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: If an account with that email exists, a password reset link has been sent.

  /auth/reset-password/{token}:
    put:
      tags: [Auth]
      summary: Reset password using token from email
      description: |
        Validates the raw reset token (checked against SHA-256 hash in DB) and its expiry.
        On success, sets the new password and returns a fresh JWT so the user is immediately logged in.

        The token is **single-use** — it is cleared from the DB after use.
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: Raw reset token from the `?reset_token=` query param in the email link
          example: a3f1c2d4e5b6789012345678abcdef1234567890abcdef1234567890abcdef12
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 6
                  example: myNewSecurePass99
      responses:
        "200":
          description: Password reset — returns new JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Token invalid/expired or password too short
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                expired:
                  summary: Token expired
                  value:
                    success: false
                    message: Password reset link is invalid or has expired. Please request a new one.
                weakPassword:
                  summary: Password too short
                  value:
                    success: false
                    message: Password must be at least 6 characters

